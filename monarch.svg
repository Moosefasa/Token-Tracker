<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" fill="currentColor">
  <!--
    Monarch Crown overlay — used as a status effect watermark in the Life Tracker.
    Rendered inline via JS fetch; color/opacity controlled by .overlay-monarch CSS class.
  -->

  <!-- Crown body: three prongs, left prong, center peak, right prong, base -->
  <path d="M5,56 L5,36 L22,16 L38,36 L50,10 L62,36 L78,16 L95,36 L95,56 Z"/>

  <!-- Decorative base band (slightly brighter layer) -->
  <rect x="5" y="46" width="90" height="12" rx="2.5" opacity="0.55"/>

  <!-- Jewel circles at each prong tip -->
  <circle cx="22" cy="16" r="5"   opacity="0.7"/>
  <circle cx="50" cy="10" r="6"   opacity="0.7"/>
  <circle cx="78" cy="16" r="5"   opacity="0.7"/>

  <!-- Small highlight rings on jewels -->
  <circle cx="22" cy="16" r="2.5" opacity="0.9" fill="white"/>
  <circle cx="50" cy="10" r="3"   opacity="0.9" fill="white"/>
  <circle cx="78" cy="16" r="2.5" opacity="0.9" fill="white"/>

  <!-- Studs along the band -->
  <circle cx="30" cy="52" r="3"   opacity="0.65"/>
  <circle cx="50" cy="52" r="3"   opacity="0.65"/>
  <circle cx="70" cy="52" r="3"   opacity="0.65"/>
</svg>
