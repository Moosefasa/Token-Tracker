<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 90" fill="currentColor">
  <!--
    City's Blessing overlay — ascending star cluster watermark for the Life Tracker.
    Rendered inline via JS fetch; color/opacity controlled by .overlay-citys CSS class.

    Star formula: 5-pointed star, outer radius R, inner radius r = R * 0.4
    Points alternate outer/inner starting from the top (-90°), stepping 36°.
  -->

  <!-- Large center star  center=(50,48) R=18 r=7.2 -->
  <path d="M50,30 L54.2,44.2 L67.1,44.4 L56.9,52.2 L60.6,64.6 L50,57.2 L39.4,64.6 L43.1,52.2 L32.9,44.4 L45.8,44.2 Z"/>

  <!-- Medium left star   center=(20,65) R=11 r=4.4 -->
  <path d="M20,54 L22.6,62.1 L30.5,62.2 L24.4,67 L26.7,75.3 L20,71 L13.3,75.3 L15.6,67 L9.5,62.2 L17.4,62.1 Z"/>

  <!-- Medium right star  center=(80,62) R=11 r=4.4 -->
  <path d="M80,51 L82.6,59.1 L90.5,59.2 L84.4,64 L86.7,72.3 L80,68 L73.3,72.3 L75.6,64 L69.5,59.2 L77.4,59.1 Z"/>

  <!-- Small upper-left  center=(33,30) R=7 r=2.8 -->
  <path d="M33,23 L34.6,27.8 L39.7,27.7 L35.7,30.9 L37.1,36.1 L33,33.2 L28.9,36.1 L30.3,30.9 L26.3,27.7 L31.4,27.8 Z"/>

  <!-- Small upper-right center=(67,26) R=6 r=2.4 -->
  <path d="M67,20 L68.4,24.1 L72.7,24 L69.4,26.7 L70.5,31 L67,28.8 L63.5,31 L64.6,26.7 L61.3,24 L65.6,24.1 Z"/>

  <!-- Tiny accent top-center  center=(50,10) R=4 r=1.6 -->
  <path d="M50,6 L50.9,8.8 L53.8,8.8 L51.5,10.5 L52.4,13.4 L50,11.8 L47.6,13.4 L48.5,10.5 L46.2,8.8 L49.1,8.8 Z" opacity="0.7"/>
</svg>
